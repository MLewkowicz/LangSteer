# LangSteer: Masked-language Diffuser Actor + VoxPoser steering
# Language instructions are passed to VoxPoser (not to the policy)
condition_name: "LangSteer (ours)"

policy:
  ckpt_path: "checkpoints/diffuser_actor_calvin_maskedlang.pth"
  mask_language: true

steering: voxposer

# All 34 CALVIN tasks
