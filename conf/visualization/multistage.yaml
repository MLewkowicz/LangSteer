# @package _global_
# Visualization config for multi-stage task recording.
# Enables MP4 video recording of both cameras; all other modes off.

visualization:
  render: false
  cameras: false
  trajectory_3d: false
  reference_plot: false

  camera:
    save_dir: "outputs/cameras"
    display_mode: "side_by_side"
    save_images: false
    show_live: false

  trajectory:
    num_rollouts: 10
    max_steps: 50
    save_dir: "outputs/trajectory_viz"
    modes:
      - scatter
      - lines

  reference:
    save_dir: "outputs/reference_viz"
    show_windows: false
    plot_full_trajectory: false
    plot_sliding_windows: false
    window_timesteps: [0, 10, 20, 30]

  rollout:
    frame_skip: 1
    playback_speed: 1.0
    keep_gui_open: false

  video:
    enabled: true
    save_path: "outputs/videos"
    fps: 15
    codec: "mp4v"
    # Record cameras at high resolution via PyBullet re-render.
    # Set to 0 to use native resolution (200x200 static, 84x84 gripper).
    # Does NOT affect policy inputs.
    static_record_width: 600
    static_record_height: 600
    gripper_record_width: 300
    gripper_record_height: 300
