# Tweedie Steering Configuration
# Uses Tweedie's formula to guide diffusion policy toward reference trajectories

name: tweedie
enabled: true

# Guidance parameters
guidance_strength: 1.0  # Scale factor for guidance gradient
horizon: ${policy.pred_horizon}  # Prediction horizon (matches policy)

# Trajectory format: "dp3" or "diffuser_actor"
# Controls reference trajectory loading, coordinate conversion, and dual-scheduler handling
trajectory_format: dp3

# Prediction type: "sample" (DP3), "epsilon" (DiffuserActor), or "v_prediction"
prediction_type: sample

# Timestep-dependent scaling
use_timestep_scaling: true
min_timestep_scale: 0.1  # Linearly anneals from min to 1.0 over diffusion steps

# Device
device: ${policy.device}
