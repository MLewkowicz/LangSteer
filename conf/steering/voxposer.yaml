name: voxposer

# Steering instruction override (null = use env.task_description or top-level instruction)
# Set this to use a DIFFERENT instruction for value map generation than the policy sees.
instruction: null

# Guidance parameters
guidance_strength: 1.0
horizon: ${policy.pred_horizon}
# Must be 'epsilon' for DiffuserActor (which uses epsilon prediction)
prediction_type: epsilon
device: ${policy.device}

# Guidance mode:
#   'epsilon' — add gradient correction to ε before the scheduler step (no loop changes)
#   'dps'     — apply correction to x_{t-1} after the scheduler step (DPS-style)
guidance_mode: epsilon

# Only apply guidance for timesteps <= this value.
# Steps above this threshold are high-noise; Tweedie x_0 predictions are unreliable there.
# E.g. with 100 total steps, set to 50 to guide only the lower-noise half.
start_guidance_timestep: 50

# Timestep scaling (soft ramp within the guided window)
use_timestep_scaling: true
min_timestep_scale: 0.1

# DiffuserActor position normalization bounds (gripper_loc_bounds).
# These are in gripper-relative space (same as policy.gripper_loc_bounds).
# Required for correct world-space denormalization of predicted trajectories.
gripper_loc_bounds: ${policy.gripper_loc_bounds}
relative: ${policy.relative}

# Multi-stage: proximity threshold (meters) for advancing to the next stage.
# When the EE is within this distance of the current stage's affordance target,
# the steering module switches to the next stage's cost map.
stage_proximity_threshold: 0.05

# Dynamic costmap refresh: re-evaluate value maps with current scene state.
# Uses cached LLM code with updated object positions (no new LLM call).
refresh_costmap: true
refresh_interval: 1  # refresh every N environment steps

# Voxel map settings
map_size: 100

# LLM settings (provider-agnostic: "anthropic" or "openai")
llm_provider: openai 
llm_model: gpt-4o
llm_temperature: 0
llm_max_tokens: 512
cache_dir: cache/voxposer_llm
load_cache: true

# Workspace bounds (absolute world coords, meters)
workspace_bounds_min: [-0.35, -0.60, 0.30]
workspace_bounds_max: [0.35, 0.15, 0.85]

# 3D Visualization (static Plotly HTML, generated per stage activation)
visualize: true
visualization_quality: low
visualization_save_dir: null  # defaults to Hydra output dir

# Live 3D Dash visualization server.
# When enabled, starts a background Dash app at http://127.0.0.1:<port>
# that re-renders the current ValueMap at a fixed interval. The browser
# preserves camera rotation/zoom across updates (via Plotly uirevision),
# so you can spin the view while data refreshes.
costmap_dash: false
costmap_dash_port: 8050
costmap_dash_refresh_s: 0.5  # seconds between figure refreshes
