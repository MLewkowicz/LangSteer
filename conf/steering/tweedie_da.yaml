# Tweedie Steering for DiffuserActor
# Unconditioned inference with Tweedie guidance toward reference trajectories
#
# Usage:
#   uv run python scripts/run_experiment.py policy=diffuser_actor steering=tweedie_da \
#     policy.mask_language=true policy.corrector_steps=2

name: tweedie
enabled: true

# Guidance parameters
guidance_strength: 1.0
horizon: ${policy.pred_horizon}

# DiffuserActor-specific settings
trajectory_format: diffuser_actor
prediction_type: epsilon
gripper_loc_bounds: ${policy.gripper_loc_bounds}
relative: ${policy.relative}

# Timestep-dependent scaling
use_timestep_scaling: true
min_timestep_scale: 0.1

# Device
device: ${policy.device}
