# 3D Diffuser Actor Policy Configuration — No Language Conditioning
# Architecture must match the non-language training config exactly.

name: diffuser_actor

# Checkpoint
ckpt_path: "checkpoints/diffuser_actor_nolang.pth"
device: "cuda"

# Architecture (must match training exactly)
backbone: clip
image_size: [256, 256]
embedding_dim: 192
num_vis_ins_attn_layers: 2
use_instruction: false
fps_subsampling_factor: 3
gripper_loc_bounds: [[-0.3021, -0.2569, -0.2156], [0.3613, 0.3377, 0.1837]]
rotation_parametrization: "6D"
quaternion_format: "wxyz"
diffusion_timesteps: 25
nhist: 3
relative: true
lang_enhanced: false

# Inference
pred_horizon: 20

# Camera setup (CALVIN)
cameras: ["static", "gripper"]

# Image preprocessing
crop_images: true

# MCMC Langevin corrector (used with steering)
corrector_steps: 0
corrector_step_size: 0.001
