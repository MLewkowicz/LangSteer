# 3D Diffuser Actor Policy Configuration — masked language variant
# Uses the maskedlang checkpoint which was trained/fine-tuned to ignore
# the language instruction embedding. Language guidance is provided externally
# by VoxPoser, which decomposes the instruction into multi-stage value maps.

name: diffuser_actor

# Checkpoint
ckpt_path: "checkpoints/diffuser_actor_calvin_maskedlang.pth"
device: "cuda"

# Architecture (must match training exactly)
backbone: clip
image_size: [256, 256]
embedding_dim: 192
num_vis_ins_attn_layers: 2
use_instruction: true
fps_subsampling_factor: 3
gripper_loc_bounds: [[-0.3021, -0.2569, -0.2156], [0.3613, 0.3377, 0.1837]]
rotation_parametrization: "6D"
quaternion_format: "wxyz"
diffusion_timesteps: 25
nhist: 3
relative: true
lang_enhanced: true

# Inference
pred_horizon: 20

# Camera setup (CALVIN)
cameras: ["static", "gripper"]

# Image preprocessing
crop_images: true

# Text encoder
text_max_length: 16

# Mask the language instruction so the policy is effectively language-agnostic.
# VoxPoser handles task decomposition and spatial guidance instead.
mask_language: true

# MCMC Langevin corrector (recommended with VoxPoser steering)
corrector_steps: 2
corrector_step_size: 0.001
