# 3D Diffuser Actor Training Configuration — No Language Conditioning
# Inherits from diffuser_actor_calvin with language modules disabled.
# This produces a structurally smaller model (no language attention layers).
# Checkpoints are NOT compatible with language-conditioned models.
#
# AWS ABCD run: SageMaker overrides train_iters=600000 and checkpoint_dir.
# Local D-only smoke test: train_iters=20000 (default here).

defaults:
  - diffuser_actor_calvin

# Disable language conditioning
policy:
  use_instruction: false
  lang_enhanced: false

# All four CALVIN scenes — data paths resolved from CALVIN_3DA_DATASET_PATH env var.
# cache_size: 0 inherited from diffuser_actor_calvin (matches original --cache_size 0).
dataset:
  train_path: "${oc.env:CALVIN_3DA_DATASET_PATH,/home/mlewkowicz/LangSteer/cache/diffuser_actor_data}/training"
  val_path: "${oc.env:CALVIN_3DA_DATASET_PATH,/home/mlewkowicz/LangSteer/cache/diffuser_actor_data}/validation"
  instructions_path: null
  taskvar:
    - ["A", 0]
    - ["B", 0]
    - ["C", 0]
    - ["D", 0]

# Local default: small run for smoke-testing.
# SageMaker overrides this to 600000 via hyperparameter injection.
train_iters: 20000

# Override checkpoint/experiment naming
checkpoint_dir: "outputs/checkpoints/diffuser_actor_nolang"
experiment_name: "diffuser_actor_nolang_${now:%Y%m%d_%H%M%S}"
