# DP3 Bimodal Experiment: open_drawer + move_slider_left
# Temporary config for two-task training. Delete when done.

# Dataset Configuration
dataset:
  zarr_path: "tmp/bimodal_experiment/bimodal.zarr"
  val_ratio: 0.1
  max_train_episodes: null

# Policy Architecture (same as dp3_calvin)
policy:
  name: dp3
  obs_horizon: 2
  pred_horizon: 16
  action_horizon: 8
  num_points: 2048

  shape_meta:
    obs:
      point_cloud:
        shape: [2048, 3]
        type: point_cloud
      agent_pos:
        shape: [15]
        type: low_dim
    action:
      shape: [7]

  encoder:
    output_dim: 64
    use_pc_color: false
    pointnet_type: "pointnet"

  diffusion:
    down_dims: [512, 1024, 2048]
    kernel_size: 5
    n_groups: 8
    diffusion_step_embed_dim: 256

  scheduler:
    num_train_timesteps: 100
    num_inference_steps: 10
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: "squaredcos_cap_v2"
    clip_sample: true
    prediction_type: "sample"

# Training Hyperparameters
horizon: 16
batch_size: 64
num_workers: 4
learning_rate: 1.0e-4
betas: [0.95, 0.999]
weight_decay: 1.0e-6

# Training Schedule
num_epochs: 500
val_every: 10
checkpoint_every: 50

# Optimization
gradient_accumulation_steps: 1
gradient_clip: 1.0
use_lr_scheduler: true
lr_min: 1.0e-6

# EMA
use_ema: true
ema_power: 0.75
ema_max_value: 0.9999
ema_update_after_step: 0
ema_inv_gamma: 1.0

# Device & Seed
device: "cuda"
seed: 42

# Checkpoint Management
save_top_k: 3
resume: false
resume_checkpoint_path: null

# Logging
use_wandb: false
wandb_project: "langsteer_dp3"
experiment_name: "dp3_bimodal"
checkpoint_dir: "tmp/bimodal_experiment/checkpoints/dp3_bimodal"
