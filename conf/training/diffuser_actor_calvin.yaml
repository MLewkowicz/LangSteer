# 3D Diffuser Actor Training Configuration for CALVIN Dataset
# Original paper: 600K iters, batch 30, 6 GPUs, all 34 tasks × 4 scenes (~20K episodes)
# This config is for the two-task small-data regime (303 episodes).

# Dataset Configuration
dataset:
  train_path: "${oc.env:CALVIN_3DA_DATASET_PATH,/home/mlewkowicz/LangSteer/cache/diffuser_actor_data}/training"
  val_path: "${oc.env:CALVIN_3DA_DATASET_PATH,/home/mlewkowicz/LangSteer/cache/diffuser_actor_data}/validation"
  instructions_path: "${oc.env:CALVIN_3DA_INSTRUCTIONS_PATH,/home/mlewkowicz/LangSteer/cache/diffuser_actor_data}"
  max_episode_length: 5
  cache_size: 100
  cache_size_val: 100
  max_episodes_per_task: -1
  image_rescale: "0.75,1.25"
  dense_interpolation: true
  interpolation_length: 20  # original used 20-step trajectories
  relative_action: true
  taskvar:
    - ["D", 0]

# Policy Architecture
policy:
  backbone: clip
  image_size: [256, 256]
  embedding_dim: 192
  num_vis_ins_attn_layers: 2
  use_instruction: true
  fps_subsampling_factor: 5
  gripper_loc_bounds: [[-2, -2, -2], [2, 2, 2]]
  rotation_parametrization: "6D"
  quaternion_format: "xyzw"
  diffusion_timesteps: 100
  nhist: 3
  relative: true
  lang_enhanced: true

# Training Hyperparameters
train_iters: 200000
batch_size: 16  # Per GPU
batch_size_val: 4
num_workers: 1
lr: 1.0e-4
wd: 5.0e-3
accumulate_grad_batches: 1

# Validation
val_freq: 500  # Validate every N iterations

# EMA (Exponential Moving Average)
use_ema: true
ema_power: 0.75
ema_max_value: 0.9999
ema_update_after_step: 0
ema_inv_gamma: 1.0

# Device & Seed
device: "cuda"
seed: 0

# Checkpoint Management
checkpoint_dir: "outputs/checkpoints/diffuser_actor_calvin"
save_top_k: 3
resume: false
resume_checkpoint_path: null

# Logging
use_wandb: true
wandb_project: "langsteer_diffuser_actor"
experiment_name: "diffuser_actor_calvin_${now:%Y%m%d_%H%M%S}"
