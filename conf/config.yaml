defaults:
  - _self_
  - env: calvin
  - policy: diffuser_actor
  - steering: none
  - rollout: default
  - visualization: base  # Unified visualization config
  - experiment: null
  - training: null  # Optional: specify training config for training mode

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}

seed: 42
device: "cuda"

# Language instruction override (applies to both steering and policy)
# When null, uses the CALVIN annotation for env.task
instruction: null

# Experiment options
use_reference_init: false  # Use reference trajectory initial conditions even without steering (for fair comparison)
num_episodes: 10           # Number of episodes to evaluate
max_steps: 1000            # Maximum steps per episode
log_trajectory: false      # Save trajectory data to disk
log_dir: "outputs/trajectories"  # Directory for trajectory .npz files
enable_gui: false          # Show PyBullet GUI during rollout
