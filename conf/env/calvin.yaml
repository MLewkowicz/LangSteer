# CALVIN Environment Configuration

name: calvin

# Task specification
task: "open_drawer"  # Task name to look up in language annotations

# Dataset/environment settings
dataset_path: "/home/mlewkowicz/calvin/dataset/task_D_D"  # Path to CALVIN dataset
split: "validation"  # Dataset split: "training" or "validation"
use_gui: false      # Show PyBullet GUI for debugging

# Observation settings
num_points: 2048    # Number of points in point cloud
provide_pcd_images: false  # Provide per-pixel PCD images (required for 3D Diffuser Actor)

# Language annotations
lang_ann_path: "/home/mlewkowicz/calvin/dataset/task_D_D/validation/lang_annotations/auto_lang_ann.npy"

# Episode settings
max_steps: 1000     # Maximum steps per episode
render_mode: null   # Render mode: null, "rgb_array", or "human"
done_on_success: true  # End episode when task oracle detects success (set false for multi-stage instructions)

# Task-specific reset
use_task_initial_condition: true  # Enable task-specific scene state reset (required for proper task evaluation)
randomize_initial_condition: false  # Sample random starting states from dataset episodes for the task (overrides use_task_initial_condition)
